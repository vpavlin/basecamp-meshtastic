name: Pi aarch64 runtime stack

# Helper: build the PORTABLE aarch64 logoscore (GUI-less Logos host) needed to run the gateway
# headlessly on a Raspberry Pi (no nix on the Pi). Builds natively on a GitHub arm64 runner.
# delivery_module (#lgx-portable) + capability_module are obtained separately; our gateway .lgx
# comes from the Release workflow. Manual only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # cli-bundle-dir = a self-contained dir (logoscore + logos_host + bundled Qt, $ORIGIN rpath).
      # Pinned to the ipc-fixes rev that adds the informModuleToken retry (token handshake fix).
      - name: Build logoscore (portable cli-bundle-dir)
        run: |
          nix build "github:logos-co/logos-liblogos/8bd03a30c9935dc31b9246a6b4d7698f1f0ea0b3#cli-bundle-dir" \
            -o logoscore-out --print-out-paths
          echo "=== bundle tree ==="; ls -laR "$(readlink -f logoscore-out)" | head -50
          mkdir -p out
          cp -rL logoscore-out logoscore-bundle
          tar -C logoscore-bundle -czf out/logoscore-aarch64-bundle.tar.gz .
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: logoscore-aarch64
          path: out/*
          if-no-files-found: error
