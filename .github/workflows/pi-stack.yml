name: Pi aarch64 runtime stack

# Helper: build the PORTABLE aarch64 logoscore (GUI-less Logos host) needed to run the gateway
# headlessly on a Raspberry Pi (no nix on the Pi). Builds natively on a GitHub arm64 runner.
# delivery_module (#lgx-portable) + capability_module are obtained separately; our gateway .lgx
# comes from the Release workflow. Manual only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # 8bd03a3 has the informModuleToken retry (the event-routing fix) but a bug: it changed proxy_api's
      # onEvent call to 3-arg while its pinned SDK is 4-arg, so it won't compile. Fix = patch that one call
      # back to 4-arg (nullptr), then it builds with the retry. Resulting logoscore is 4-arg but stays
      # backward-compatible with the existing 3-arg modules (they already ran under the 4-arg March build).
      - name: Build patched logoscore (cli-bundle-dir, 8bd03a3 + onEvent nullptr)
        run: |
          git clone --no-checkout https://github.com/logos-co/logos-liblogos ll
          cd ll && git checkout 8bd03a30c9935dc31b9246a6b4d7698f1f0ea0b3
          sed -i 's/->onEvent(replica, eventNameStr,/->onEvent(replica, nullptr, eventNameStr,/' src/logos_core/proxy_api.cpp
          echo "=== patched call ==="; grep -n "onEvent(replica" src/logos_core/proxy_api.cpp
          git config user.email ci@local && git config user.name ci
          git commit -aqm "patch: onEvent 4-arg nullptr (fix 8bd03a3 build)"   # so the flake sees it clean
          nix build .#cli-bundle-dir -o ../logoscore-out --print-out-paths
          cd ..
          echo "=== bundle tree ==="; ls -laR "$(readlink -f logoscore-out)" | head -40
          mkdir -p out
          cp -rL logoscore-out logoscore-bundle
          tar -C logoscore-bundle -czf out/logoscore-aarch64-bundle.tar.gz .
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: logoscore-aarch64
          path: out/*
          if-no-files-found: error
