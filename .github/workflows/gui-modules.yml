name: GUI modules (arm64 @ aea29d37)

# Build gateway (core) + ui (ui_qml) + delivery_module for arm64 against the SDK rev the newest
# aarch64 Basecamp GUI AppImage uses (logos-cpp-sdk aea29d37, 3-arg onEvent) so they ABI-match and
# load inside the GUI (ui-host path). Used to test bidirectional relay under the GUI (xvfb) on the Pi.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # Default SDK (1468180b, 3-arg) — the exact build proven to work in the laptop GUI. The SDK is
      # static-linked into each .so, so GUI compatibility is about IPC protocol, not symbol linking.
      - name: Build gateway (core) .lgx
        run: nix build ./gateway#lgx-portable -o gw-lgx --print-out-paths

      - name: Build ui (ui_qml) .lgx
        run: nix build ./ui#lgx-portable -o ui-lgx --print-out-paths

      - name: Collect
        run: |
          mkdir -p dist
          for f in gw-lgx/*.lgx ui-lgx/*.lgx; do
            [ -e "$f" ] && cp -L "$f" "dist/$(basename "$f")"
          done
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: gui-modules-arm64
          path: dist/*.lgx
          if-no-files-found: error
